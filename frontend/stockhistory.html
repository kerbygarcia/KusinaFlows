<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    KusinaFlow Inventory System
  </title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- sidebar for navigation -->

  <aside class="sidebar">

    <div class="logo-section">

      <div class="logo-placeholder">

        <img
          src="logoPlaceholder.jpeg"
          alt="KusinaFlow Logo"
        >

      </div>

      <h2>KusinaFlow</h2>

      <p>Inventory Management</p>

      <p1 class="manager-only">
        Manager View</p1> <!--added by miles-->


    </div>

    <nav>

      <ul>

        <li id="Dashboard">
          Dashboard
        </li>

        <li class="StockBtn">
          Stocks
        </li>

        <li id="reportsBtn" class="manager-only">
          Generate Reports
        </li>

        <li class="active" class="manager-only">
          Stock History
        </li>

        <li id="logoutBtn">
          Log Out
        </li>

      </ul>

    </nav>

  </aside>

  <!-- main inventory section -->

  <main class="main-content">

    <header class="topbar">

      <div>

        <h1>Inventory Dashboard</h1>

        <p class="subtitle">
          Manage stock and inventory records
        </p>

      </div>

      <!-- action buttons -->

      <div class="topbar-actions">

        <button
          id="addItemBtn"
          class="manager-only"
        >
          + Add Item
        </button>

        <button id="stockInBtn">
          Stock-In
        </button>

        <button id="stockOutBtn">
          Stock-Out
        </button>

        <button id="lowStockBtn">
          Low Stock Items
        </button>

      </div>

    </header>

    <!-- dashboard cards -->


  <script src="script.js"></script>

</body>
</html>
