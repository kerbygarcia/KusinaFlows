<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KusinaFlow Inventory System</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="logo-section">
      <!-- <div class="logo-placeholder">
        <img src="logoPlaceholder.jpeg" alt="KusinaFlow Logo">
      </div> -->
      <h2>kusinaflow</h2>
      <p>Inventory management</p>
    </div>

    <nav>
      <ul>
        <li id="dashboardBtn">Dashboard</li>
        <li id="stocksBtn" class="active">Stocks</li>
        <li id="reportBtn">Generate Reports</li>
        <li id="stockHistoryBtn">Stock History</li>
        <li id="logoutBtn">Log Out</li>
      </ul>
    </nav>
  </aside>

  <main class="main-content">

    <header class="topbar">
      <div>
        <h1>Inventory Management</h1>
        <p class="subtitle">Manage items, stock-in, and stock-out</p>
      </div>

      <div class="topbar-actions">
        <button id="addItemBtn">Add Item</button>
        <button id="stockInBtn">Stock-In</button>
        <button id="stockOutBtn">Stock-Out</button>
        <button id="lowStockBtn">Low Stock</button>
      </div>
    </header>

    <section class="search-section">
      <input type="text" id="searchInput" placeholder="Search items...">
    </section>

    <section class="table-container">
      <div class="table-header" style="display: flex; justify-content: space-between; align-items: center; width: 100%; padding-bottom: 10px;">
          <h2>Inventory Items</h2>
          <label style="font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;">
            <input type="checkbox" id="showUnavailableCheckbox" style="transform: scale(1.2); cursor: pointer;"> 
            Include Unavailable Items
          </label>
      </div>
      
      <table>
        <thead>
          <tr>
            <th></th> <th>Item Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Category</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="inventoryTableBody">
          </tbody>
      </table>
    </section>
  </main>

  <div class="modal hidden" id="itemModal">
    <div class="modal-content">
      <h2 id="modalTitle">Add Item</h2>
      
      <form id="itemForm">
        <input type="hidden" id="editBatchId">
        <input type="hidden" id="editItemId">

        <input type="text" id="itemName" placeholder="Item Name" required>
        <input type="number" id="itemQuantity" placeholder="Quantity" required>
        <input type="text" id="itemCategory" placeholder="Category" required>
        <input type="number" step="0.01" id="itemPrice" placeholder="Price" required>
        
        <label style="font-size: 12px; margin-bottom: 5px; color: #555; font-weight: bold; display: block;">Use-Thru-Date</label>
        <input type="date" id="itemUTD" required>

        <div id="itemApprovalSection" class="hidden" style="display: flex; flex-direction: column; width: 100%; margin-top: 10px;">
          <label style="font-size: 12px; margin-bottom: 5px; color: #555; font-weight: bold;">Manager Approval Required:</label>
          <input type="text" id="itemApprover" placeholder="Approver Manager Name">
        </div>

        <div class="modal-buttons">
          <button type="submit">Save Item</button>
          <button type="button" id="closeModal">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal hidden" id="stockModal">
    <div class="modal-content">
      <h2 id="stockModalTitle">Stock</h2>
      
      <form id="stockForm">
        <select id="stockItemSelect" required></select>
        
        <div id="batchSelectContainer" style="display: none; margin-bottom: 15px; margin-top: 15px;">
          <label for="stockBatchSelect" style="font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px;">Select Deductible Batch Source</label>
          <select id="stockBatchSelect" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;"></select>
        </div>

        <input type="number" id="stockQuantity" placeholder="Quantity" required>
        
        <label id="stockUTDLabel" style="font-size: 12px; margin-bottom: 5px; color: #555; font-weight: bold; display: block; margin-top: 10px;">Use-Thru-Date</label>
        <input type="date" id="stockUTD">

        <div id="stockApprovalSection" class="hidden" style="display: flex; flex-direction: column; width: 100%; margin-top: 10px;">
          <label style="font-size: 12px; margin-bottom: 5px; color: #555; font-weight: bold;">Manager Approval Required:</label>
          <input type="text" id="stockApprover" placeholder="Approver Manager Name">
        </div>

        <div class="modal-buttons">
          <button type="submit">Submit</button>
          <button type="button" id="closeStockModal">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../nav.js"></script>
  <script src="stocks.js"></script>
</body>
</html>
