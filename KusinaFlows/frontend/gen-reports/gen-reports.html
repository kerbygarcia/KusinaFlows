<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate Reports</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <!-- sidebar -->
  <aside class="sidebar">
    <div class="logo-section">
      <h2>kusinaflow</h2>
      <p>Inventory management</p>
    </div>

    <nav>
      <ul>
        <li id="dashboardBtn">Dashboard</li>
        <li id="stocksBtn">Stocks</li>
        <li id="reportBtn">Generate Reports</li>
        <li id="stockHistoryBtn">Stock History</li>
        <li id="logoutBtn">Log Out</li>
      </ul>
    </nav>
  </aside>

  <!-- main content -->
  <main class="main-content">

    <header class="topbar">
      <div>
        <h1>Generate Reports</h1>
        <p class="subtitle">View and print inventory, movement, and financial logs</p>
      </div>
    </header>

    <div class="dashboard-cards">
      <div class="card">
        <h3>Total Items</h3>
        <p id="totalItemsReport">0</p>
      </div>

      <div class="card">
        <h3>Total Inventory Value</h3>
        <p id="totalValueReport">₱0</p>
      </div>

      <div class="card">
        <h3>Low Stock Items</h3>
        <p id="lowStockReport">0</p>
      </div>
    </div>

    <!-- Report Action Buttons -->
    <div class="topbar-actions" style="margin-bottom: 30px; display: flex; gap: 15px; flex-wrap: wrap;">
      <button id="btnInventoryReport">Current Inventory Level Report</button>
      <button id="btnMovementReport">Stock Movement Report</button>
      <button id="btnFinanceReport">Expense/Financial Report</button>
    </div>

    <!-- Report Table Display Container -->
    <section class="table-container hidden" id="reportTableContainer">
      <div class="table-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
        <div>
          <!-- Title on screen -->
          <h2 id="reportScreenTitle" style="font-size: 20px;">Report</h2>
        </div>
        <button id="btnPrintReport">Print Report</button>
      </div>

      <!-- Printable Area -->
      <div id="reportPrintArea">
        <div class="print-title-block" style="margin-bottom: 20px;">
          <h2 id="printReportTitle" style="font-size: 22px; color: #3b2a1a; margin-bottom: 5px;">Report Title</h2>
          <p id="printReportSubtitle" style="font-size: 14px; color: #666;">Generated Report Details</p>
        </div>

        <table>
          <thead id="reportTableHead"></thead>
          <tbody id="reportTableBody"></tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="reports.js"></script>
  <script src="../nav.js"></script>

</body>
</html>
